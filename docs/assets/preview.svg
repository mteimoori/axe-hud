<svg width="960" height="560" viewBox="0 0 960 560" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect width="960" height="560" fill="#eef0f4"/>

  <!-- Browser window -->
  <rect x="28" y="26" width="904" height="508" rx="16" fill="#ffffff" stroke="#e3e5ea"/>

  <!-- Title bar -->
  <circle cx="56" cy="54" r="6" fill="#ff5f57"/>
  <circle cx="76" cy="54" r="6" fill="#febc2e"/>
  <circle cx="96" cy="54" r="6" fill="#28c840"/>
  <rect x="124" y="44" width="380" height="20" rx="10" fill="#f1f2f4"/>
  <line x1="28" y1="82" x2="932" y2="82" stroke="#eceef1"/>

  <!-- Page content -->
  <text x="60" y="128" fill="#1d1d1f" font-size="20" font-weight="700">Overview</text>
  <rect x="60" y="150" width="470" height="12" rx="6" fill="#e7e8ec"/>
  <rect x="60" y="172" width="420" height="12" rx="6" fill="#e7e8ec"/>
  <rect x="60" y="206" width="360" height="12" rx="6" fill="#eef0f3"/>
  <rect x="60" y="228" width="300" height="12" rx="6" fill="#eef0f3"/>

  <!-- Floating widget (red = violations found) -->
  <g>
    <rect x="360" y="452" width="104" height="44" rx="22" fill="#dc2626"/>
    <text x="386" y="479" fill="#ffffff" font-size="13" font-weight="700" letter-spacing="1.2">AXE</text>
    <circle cx="438" cy="474" r="11" fill="#ffffff" fill-opacity="0.25"/>
    <text x="438" y="479" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">3</text>
  </g>

  <!-- Report sidebar -->
  <line x1="612" y1="82" x2="612" y2="534" stroke="#e5e7eb"/>
  <text x="636" y="120" fill="#111827" font-size="17" font-weight="700">Accessibility</text>
  <!-- re-audit + close icons -->
  <g stroke="#374151" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="872,108 872,114 866,114"/>
    <path d="M870.5 117a5 5 0 1 1-1.2-5.2L872 114"/>
    <line x1="900" y1="108" x2="912" y2="120"/>
    <line x1="912" y1="108" x2="900" y2="120"/>
  </g>

  <!-- Severity chips -->
  <rect x="636" y="140" width="56" height="28" rx="14" fill="#111827"/>
  <text x="664" y="158" fill="#ffffff" font-size="12" font-weight="700" text-anchor="middle">All 1</text>
  <rect x="700" y="140" width="84" height="28" rx="14" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="742" y="158" fill="#374151" font-size="12" font-weight="700" text-anchor="middle">Critical 1</text>
  <rect x="792" y="140" width="84" height="28" rx="14" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="834" y="158" fill="#374151" font-size="12" font-weight="700" text-anchor="middle">Serious 0</text>

  <!-- Finding row -->
  <line x1="612" y1="196" x2="932" y2="196" stroke="#f0f1f3"/>
  <circle cx="640" cy="222" r="5" fill="#b91c1c"/>
  <text x="658" y="227" fill="#111827" font-size="14" font-weight="600">Elements must meet contrast ratio</text>
  <g stroke="#9ca3af" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="908,216 914,222 908,228"/>
  </g>
  <line x1="612" y1="248" x2="932" y2="248" stroke="#f0f1f3"/>
  <circle cx="640" cy="274" r="5" fill="#9ca3af"/>
  <rect x="658" y="268" width="190" height="11" rx="5" fill="#e7e8ec"/>
</svg>
