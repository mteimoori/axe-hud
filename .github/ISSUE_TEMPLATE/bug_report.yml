name: Bug report
description: Report a problem with axe-hud
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps (or a link to a reproduction) that trigger the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: axe-hud version
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser, framework, and bundler.
    validations:
      required: false
